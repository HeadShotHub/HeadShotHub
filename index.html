<!DOCTYPE html>
<html>
<head>
<title>Headshot Hub Arena</title>
<style>
body {
margin: 0;
font-family: Arial;
background: #0b1020;
color: white;
text-align: center;
}

header {
padding: 15px;
font-size: 22px;
background: #111a33;
}

.panel {
display: flex;
justify-content: center;
gap: 20px;
margin-top: 20px;
}

.card {
background: #151f3d;
padding: 15px;
border-radius: 10px;
width: 250px;
}

#gameArea {
margin: 20px auto;
width: 80%;
height: 400px;
background: #111a33;
position: relative;
overflow: hidden;
border-radius: 10px;
}

.target {
width: 40px;
height: 40px;
background: red;
border-radius: 50%;
position: absolute;
cursor: pointer;
}

button {
padding: 10px;
border: none;
border-radius: 8px;
background: #22c55e;
cursor: pointer;
font-weight: bold;
}
</style>
</head>

<body>

<header>🎯 Headshot Hub Arena</header>

<button id="loginBtn">Login with Google</button>
<p id="status">Not logged in</p>

<div class="panel">
<div class="card">
<h3>👤 Profile</h3>
<p id="name"></p>
<p>RR: <span id="rr">0</span></p>
<p>Wins: <span id="wins">0</span></p>
<p>Losses: <span id="losses">0</span></p>
</div>

<div class="card">
<h3>🎮 Aim Trainer</h3>
<button onclick="startGame()">Start</button>
<p>Score: <span id="score">0</span></p>
</div>
</div>

<div id="gameArea"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getAuth,
GoogleAuthProvider,
signInWithPopup,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
getFirestore,
doc,
getDoc,
setDoc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";


// 🔥 YOUR CONFIG HERE
const firebaseConfig = {
  apiKey: "AIzaSyAWnMFACrQhkpFcQcdJdjqPUN4nRN9nn1Q",
  authDomain: "headshothubarena-50388.firebaseapp.com",
  projectId: "headshothubarena-50388",
  storageBucket: "headshothubarena-50388.firebasestorage.app",
  messagingSenderId: "618630069956",
  appId: "1:618630069956:web:2b542df64da400bd9c5391"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

let currentUser;
let score = 0;

document.getElementById("loginBtn").onclick = () => {
signInWithPopup(auth, provider);
};

async function createProfile(user) {
const ref = doc(db, "players", user.uid);
const snap = await getDoc(ref);

if (!snap.exists()) {
await setDoc(ref, {
name: user.displayName,
rr: 0,
wins: 0,
losses: 0
});
}
}

async function loadProfile(user) {
const ref = doc(db, "players", user.uid);
const snap = await getDoc(ref);

if (snap.exists()) {
const data = snap.data();

document.getElementById("name").innerText = data.name;
document.getElementById("rr").innerText = data.rr;
document.getElementById("wins").innerText = data.wins;
document.getElementById("losses").innerText = data.losses;
}
}

onAuthStateChanged(auth, async (user) => {
if (user) {
currentUser = user;
document.getElementById("status").innerText =
"Logged in as " + user.displayName;

await createProfile(user);
await loadProfile(user);
}
});

window.startGame = function () {
score = 0;
document.getElementById("score").innerText = score;

spawnTarget();
};

function spawnTarget() {
const game = document.getElementById("gameArea");

const t = document.createElement("div");
t.className = "target";

t.style.top = Math.random() * 350 + "px";
t.style.left = Math.random() * 800 + "px";

t.onclick = () => {
score++;
document.getElementById("score").innerText = score;
t.remove();
spawnTarget();
};

game.appendChild(t);

setTimeout(() => {
if (t.parentNode) {
t.remove();
spawnTarget();
}
}, 1200);
}

</script>

</body>
</html>
