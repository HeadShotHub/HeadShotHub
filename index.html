<!DOCTYPE html>
<html>
<head>
<title>Headshot Hub Online</title>
</head>
<body>

<h2>🎯 Headshot Hub Online</h2>

<button id="loginBtn">Login with Google</button>

<h3 id="status">Not logged in</h3>

<div id="profile" style="display:none;">
<h3>👤 Profile</h3>
<p id="name"></p>
<p>RR: <span id="rr"></span></p>
<p>Wins: <span id="wins"></span></p>
<p>Losses: <span id="losses"></span></p>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getAuth,
GoogleAuthProvider,
signInWithPopup,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
getFirestore,
doc,
getDoc,
setDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";


// 🔥 YOUR FIREBASE CONFIG (REPLACE THIS)
const firebaseConfig = {
  apiKey: "AIzaSyAWnMFACrQhkpFcQcdJdjqPUN4nRN9nn1Q",
  authDomain: "headshothubarena-50388.firebaseapp.com",
  projectId: "headshothubarena-50388",
  storageBucket: "headshothubarena-50388.firebasestorage.app",
  messagingSenderId: "618630069956",
  appId: "1:618630069956:web:2b542df64da400bd9c5391"
};


// INIT
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();


// LOGIN BUTTON
document.getElementById("loginBtn").onclick = () => {
signInWithPopup(auth, provider);
};


// CREATE PROFILE IF NOT EXISTS
async function createProfile(user) {
const ref = doc(db, "players", user.uid);
const snap = await getDoc(ref);

if (!snap.exists()) {
await setDoc(ref, {
name: user.displayName,
rr: 0,
wins: 0,
losses: 0,
rank: "Iron"
});
}
}


// LOAD PROFILE
async function loadProfile(user) {
const ref = doc(db, "players", user.uid);
const snap = await getDoc(ref);

if (snap.exists()) {
const data = snap.data();

document.getElementById("profile").style.display = "block";

document.getElementById("name").innerText = data.name;
document.getElementById("rr").innerText = data.rr;
document.getElementById("wins").innerText = data.wins;
document.getElementById("losses").innerText = data.losses;
}
}


// AUTH STATE
onAuthStateChanged(auth, async (user) => {
if (user) {
document.getElementById("status").innerText =
"Logged in as " + user.displayName;

await createProfile(user);
await loadProfile(user);

} else {
document.getElementById("status").innerText = "Not logged in";
}
});

</script>

</body>
</html>
