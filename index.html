<!DOCTYPE html>
<html>
<head>
<title>HEADSHOT HUB // ABSOLUTE FINAL FORM</title>

<style>
body{
margin:0;
font-family:Arial;
background:#070b14;
color:white;
}

/* TOP BAR */
.top{
display:flex;
justify-content:space-between;
padding:14px;
background:#0d1424;
border-bottom:2px solid #ff4655;
}

.brand{
color:#ff4655;
font-weight:bold;
letter-spacing:3px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 2fr 1fr;
gap:10px;
padding:10px;
}

.panel{
background:#111a2e;
border-left:3px solid #ff4655;
padding:10px;
min-height:200px;
}

button{
background:#ff4655;
border:none;
padding:10px;
color:white;
width:100%;
margin-top:5px;
cursor:pointer;
}

#game{
height:500px;
background:#0b1220;
position:relative;
overflow:hidden;
border:1px solid #1f2a44;
}

.target{
width:30px;
height:30px;
border-radius:50%;
background:#ff4655;
position:absolute;
box-shadow:0 0 10px #ff4655;
}

.small{font-size:12px;opacity:0.7;}
</style>
</head>

<body>

<div class="top">
<div class="brand">HEADSHOT HUB // FINAL PROTOCOL</div>
<div id="status">OFFLINE</div>
</div>

<div class="grid">

<div class="panel">
<h3>PROFILE</h3>
<p id="name">-</p>
<p>RR: <span id="rr">0</span></p>
<p>RANK: <span id="rank">IRON</span></p>

<button id="login">LOGIN</button>
<button id="logout">LOGOUT</button>
</div>

<div class="panel">
<h3>MATCH SYSTEM</h3>
<button onclick="queue()">QUEUE</button>
<button onclick="start()">START</button>
<p id="matchStatus" class="small"></p>
</div>

<div class="panel">
<h3>TOURNAMENT</h3>
<button onclick="createTournament()">CREATE</button>
<div id="tournament"></div>
</div>

</div>

<div id="game"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getAuth,GoogleAuthProvider,signInWithPopup,onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
getFirestore,
doc,getDoc,setDoc,updateDoc,
collection,addDoc,getDocs,deleteDoc,
onSnapshot,query,orderBy,limit,runTransaction
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAWnMFACrQhkpFcQcdJdjqPUN4nRN9nn1Q",
authDomain: "headshothubarena-50388.firebaseapp.com",
projectId: "headshothubarena-50388",
storageBucket: "headshothubarena-50388.firebasestorage.app",
messagingSenderId: "618630069956",
appId: "1:618630069956:web:2b542df64da400bd9c5391"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let user, matchId;

/* RANK */
function rank(r){
if(r<100)return"IRON";
if(r<200)return"BRONZE";
if(r<350)return"SILVER";
if(r<500)return"GOLD";
return"DIAMOND";
}

/* AUTH */
document.getElementById("login").onclick=
()=>signInWithPopup(auth,new GoogleAuthProvider());

document.getElementById("logout").onclick=
()=>auth.signOut();

onAuthStateChanged(auth,async u=>{
if(!u)return;
user=u;

document.getElementById("status").innerText="ONLINE";

await ensure();
await load();
});

/* PLAYER */
async function ensure(){
const r=doc(db,"players",user.uid);
const s=await getDoc(r);

if(!s.exists()){
await setDoc(r,{name:user.displayName,rr:0});
}
}

async function load(){
const s=await getDoc(doc(db,"players",user.uid));
const d=s.data();

document.getElementById("name").innerText=d.name;
document.getElementById("rr").innerText=d.rr;
document.getElementById("rank").innerText=rank(d.rr);
}

/* QUEUE */
window.queue=async function(){
const q=await getDocs(collection(db,"queue"));

if(!q.empty){
const opp=q.docs[0];

matchId=(await addDoc(collection(db,"matches"),{
p1:opp.id,
p2:user.uid,
score:{},
status:"active",
created:Date.now()
})).id;

await deleteDoc(opp.ref);

listen();
}else{
await addDoc(collection(db,"queue"),{
uid:user.uid,
t:Date.now()
});
}
};

/* REAL MATCH */
function listen(){
onSnapshot(doc(db,"matches",matchId),snap=>{
const d=snap.data();
if(!d)return;

if(d.status==="finished"){
giveRR(d.winner===user.uid);
document.getElementById("game").innerHTML="<h2>END</h2>";
}
});
}

/* RR */
async function giveRR(win){
const r=doc(db,"players",user.uid);
const s=await getDoc(r);

let rr=s.data().rr;
rr+=win?25:-20;
if(rr<0)rr=0;

await updateDoc(r,{rr});
load();
}

/* GAME */
window.start=function(){
document.getElementById("game").innerHTML="";
spawn();
};

function spawn(){
const g=document.getElementById("game");

const t=document.createElement("div");
t.className="target";

t.style.top=Math.random()*450+"px";
t.style.left=Math.random()*900+"px";

t.onclick=async()=>{
await runTransaction(db,async(tx)=>{
const ref=doc(db,"matches",matchId);
const s=await tx.get(ref);
const d=s.data();

if(!d.score[user.uid])d.score[user.uid]=0;
d.score[user.uid]++;

let w=null;
if(d.score[user.uid]>=10)w=user.uid;

tx.update(ref,{
score:d.score,
winner:w,
status:w?"finished":"active"
});
});

t.remove();
spawn();
};

g.appendChild(t);

setTimeout(()=>{if(t.parentNode){t.remove();spawn();}},650);
}

/* TOURNAMENT */
window.createTournament=async function(){
const players=await getDocs(collection(db,"players"));

let list=[];
players.forEach(p=>list.push(p.id));

list.sort(()=>Math.random()-0.5);

await setDoc(doc(db,"tournaments","active"),{
players:list,
round:1,
status:"open"
});

alert("TOURNAMENT CREATED");
};

</script>

</body>
</html>
