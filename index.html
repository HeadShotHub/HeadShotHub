<!DOCTYPE html>
<html>
<head>
<title>Headshot Hub Arena</title>

<style>
body {
margin: 0;
font-family: Arial;
background: radial-gradient(circle at top, #0f172a, #020617);
color: white;
text-align: center;
}

header {
padding: 15px;
font-size: 22px;
font-weight: bold;
}

.topbar {
margin: 10px;
}

button {
background: linear-gradient(90deg, #22c55e, #16a34a);
border: none;
padding: 10px 14px;
border-radius: 10px;
color: white;
font-weight: bold;
cursor: pointer;
margin: 5px;
}

.card {
background: rgba(255,255,255,0.06);
border: 1px solid rgba(255,255,255,0.1);
border-radius: 14px;
padding: 15px;
width: 250px;
margin: 10px auto;
}

#gameArea {
margin: 20px auto;
width: 80%;
height: 400px;
background: rgba(255,255,255,0.03);
border-radius: 10px;
position: relative;
overflow: hidden;
}

.target {
width: 40px;
height: 40px;
border-radius: 50%;
background: radial-gradient(circle, red, darkred);
box-shadow: 0 0 10px red;
position: absolute;
cursor: pointer;
}
</style>
</head>

<body>

<header>🎯 Headshot Hub Arena</header>

<div class="topbar">
<button id="loginBtn">Login with Google</button>
<button id="logoutBtn" style="display:none;">Logout</button>
<p id="status">Not logged in</p>
</div>

<div class="card">
<h3>👤 Profile</h3>
<p id="name">-</p>
<p>RR: <span id="rr">0</span></p>
<p>Wins: <span id="wins">0</span></p>
<p>Losses: <span id="losses">0</span></p>
</div>

<div class="card">
<h3>🎮 Aim Trainer</h3>
<button onclick="startGame()">Start Game</button>
<p>Score: <span id="score">0</span></p>
</div>

<div id="gameArea"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getAuth,
GoogleAuthProvider,
signInWithPopup,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
getFirestore,
doc,
getDoc,
setDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";


// 🔥 YOUR FIREBASE CONFIG (YOUR REAL ONE)
const firebaseConfig = {
apiKey: "AIzaSyAWnMFACrQhkpFcQcdJdjqPUN4nRN9nn1Q",
authDomain: "headshothubarena-50388.firebaseapp.com",
projectId: "headshothubarena-50388",
storageBucket: "headshothubarena-50388.firebasestorage.app",
messagingSenderId: "618630069956",
appId: "1:618630069956:web:2b542df64da400bd9c5391"
};


// INIT
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

let currentUser;
let score = 0;
let rounds = 0;
const MAX_ROUNDS = 10;


// LOGIN
document.getElementById("loginBtn").onclick = () => {
signInWithPopup(auth, provider);
};

document.getElementById("logoutBtn").onclick = () => {
auth.signOut();
};


// CREATE PROFILE
async function createProfile(user) {
const ref = doc(db, "players", user.uid);
const snap = await getDoc(ref);

if (!snap.exists()) {
await setDoc(ref, {
name: user.displayName,
rr: 0,
wins: 0,
losses: 0
});
}
}


// LOAD PROFILE
async function loadProfile(user) {
const ref = doc(db, "players", user.uid);
const snap = await getDoc(ref);

if (snap.exists()) {
const data = snap.data();

document.getElementById("name").innerText = data.name;
document.getElementById("rr").innerText = data.rr;
document.getElementById("wins").innerText = data.wins;
document.getElementById("losses").innerText = data.losses;
}
}


// AUTH STATE
onAuthStateChanged(auth, async (user) => {
if (user) {
currentUser = user;

document.getElementById("status").innerText =
"Logged in as " + user.displayName;

document.getElementById("loginBtn").style.display = "none";
document.getElementById("logoutBtn").style.display = "inline-block";

await createProfile(user);
await loadProfile(user);

} else {
document.getElementById("status").innerText = "Not logged in";

document.getElementById("loginBtn").style.display = "inline-block";
document.getElementById("logoutBtn").style.display = "none";
}
});


// AIM TRAINER
window.startGame = function () {
score = 0;
rounds = 0;

document.getElementById("score").innerText = score;
document.getElementById("gameArea").innerHTML = "";

spawnTarget();
};

function spawnTarget() {
if (rounds >= MAX_ROUNDS) {
endGame();
return;
}

const game = document.getElementById("gameArea");

const t = document.createElement("div");
t.className = "target";

t.style.top = Math.random() * 350 + "px";
t.style.left = Math.random() * 800 + "px";

t.onclick = () => {
score++;
rounds++;
document.getElementById("score").innerText = score;
t.remove();
spawnTarget();
};

game.appendChild(t);

setTimeout(() => {
if (t.parentNode) {
t.remove();
rounds++;
spawnTarget();
}
}, 1000);
}

function endGame() {
document.getElementById("gameArea").innerHTML =
`<h2>Game Over</h2><p>Score: ${score}/${MAX_ROUNDS}</p>`;
}

</script>

</body>
</html>
