<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Headshot Hub Profiles</title>

<style>
body {
margin: 0;
font-family: Arial;
background: radial-gradient(circle at top, #0f172a, #050814);
color: white;
text-align: center;
}

header {
padding: 15px;
font-size: 24px;
font-weight: bold;
}

.card {
background: rgba(255,255,255,0.05);
max-width: 500px;
margin: 10px auto;
padding: 15px;
border-radius: 12px;
}

input {
padding: 10px;
width: 70%;
border-radius: 8px;
border: none;
}

button {
padding: 10px 14px;
margin: 5px;
border-radius: 8px;
border: none;
background: #22c55e;
font-weight: bold;
cursor: pointer;
}

button:hover { background: #16a34a; }

.hidden { display: none; }

.rank {
font-size: 22px;
font-weight: bold;
}

.small {
font-size: 13px;
opacity: 0.8;
}
</style>
</head>

<body>

<header>🎯 Headshot Hub Profiles</header>

<!-- LOGIN / PROFILE SELECT -->
<div id="login" class="card">
<h3>Create / Select Profile</h3>
<input id="username" placeholder="Enter username">
<br>
<button onclick="createProfile()">Continue</button>
<div class="small">Profiles are saved on this device</div>
</div>

<!-- MAIN GAME UI -->
<div id="app" class="hidden">

<div class="card">
<h3>👤 Player</h3>
<div id="playerName"></div>
<div id="rank" class="rank"></div>
<div>RR: <span id="rr">0</span></div>
</div>

<div class="card">
<h3>📊 Stats</h3>
<div id="stats"></div>
</div>

<button onclick="addWin()">Simulate Win</button>
<button onclick="addLoss()">Simulate Loss</button>
<button onclick="resetData()">Reset Profile</button>

</div>

<script>

let profile = null;

function createProfile() {
let name = document.getElementById("username").value;
if (!name) return;

let data = localStorage.getItem("hh_" + name);

if (data) {
profile = JSON.parse(data);
} else {
profile = {
name: name,
rr: 0,
wins: 0,
losses: 0,
best: 0
};
}

save();
loadUI();

document.getElementById("login").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");
}

function save() {
localStorage.setItem("hh_" + profile.name, JSON.stringify(profile));
}

function getRank(rr) {
if (rr < 100) return "Iron";
if (rr < 200) return "Bronze";
if (rr < 350) return "Silver";
if (rr < 500) return "Gold";
if (rr < 700) return "Platinum";
return "Diamond";
}

function loadUI() {
document.getElementById("playerName").innerText = profile.name;

document.getElementById("rr").innerText = profile.rr;

document.getElementById("rank").innerText = getRank(profile.rr);

document.getElementById("stats").innerHTML =
`Wins: ${profile.wins}<br>
Losses: ${profile.losses}<br>
Best RR: ${profile.best}`;
}

function addWin() {
profile.wins++;
profile.rr += 25;

if (profile.rr > profile.best) profile.best = profile.rr;

save();
loadUI();
}

function addLoss() {
profile.losses++;
profile.rr -= 15;
if (profile.rr < 0) profile.rr = 0;

save();
loadUI();
}

function resetData() {
profile.rr = 0;
profile.wins = 0;
profile.losses = 0;
profile.best = 0;

save();
loadUI();
}

</script>

</body>
</html>
