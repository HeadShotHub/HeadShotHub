<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Headshot Hub - Aim Trainer</title>

<style>
body {
margin: 0;
font-family: Arial;
background: #0b1220;
color: white;
text-align: center;
overflow: hidden;
}

header {
padding: 15px;
font-size: 26px;
font-weight: bold;
}

#menu {
margin-top: 10px;
}

button {
padding: 10px 14px;
margin: 5px;
border: none;
border-radius: 8px;
background: #22c55e;
font-weight: bold;
cursor: pointer;
}

button:hover {
background: #16a34a;
}

#gameArea {
position: relative;
width: 100vw;
height: 65vh;
background: #111827;
margin-top: 10px;
overflow: hidden;
}

.target {
position: absolute;
width: 50px;
height: 50px;
border-radius: 50%;
background: red;
cursor: pointer;
}

.info {
margin-top: 10px;
}

.bad { color: #ef4444; }
.good { color: #22c55e; }
.mid { color: #facc15; }

#leaderboard {
margin-top: 10px;
font-size: 14px;
}
</style>
</head>

<body>

<header>🎯 Headshot Hub Aim Trainer</header>

<div id="menu">
<button onclick="startGame('easy')">Easy</button>
<button onclick="startGame('medium')">Medium</button>
<button onclick="startGame('hard')">Hard</button>
<button onclick="startGame('impossible')">Impossible 🔥</button>
</div>

<div class="info" id="info">Select a mode to start</div>

<div id="gameArea"></div>

<div class="info" id="stats"></div>

<div id="leaderboard"></div>

<script>

let gameArea = document.getElementById("gameArea");
let info = document.getElementById("info");
let stats = document.getElementById("stats");

let startTime;
let score = 0;
let clicks = 0;
let totalReaction = 0;
let active = false;

let leaderboard = JSON.parse(localStorage.getItem("leaderboard")) || [];

function startGame(mode) {
resetGame();
active = true;

let speed;

if (mode === "easy") speed = 1200;
if (mode === "medium") speed = 800;
if (mode === "hard") speed = 500;
if (mode === "impossible") speed = 250;

info.innerHTML = "Mode: " + mode.toUpperCase();

spawnTarget(speed, mode);
}

function spawnTarget(speed, mode) {
if (!active) return;

let target = document.createElement("div");
target.classList.add("target");

let x = Math.random() * (window.innerWidth - 60);
let y = Math.random() * (gameArea.offsetHeight - 60);

target.style.left = x + "px";
target.style.top = y + "px";

startTime = Date.now();

target.onclick = () => {
let reaction = Date.now() - startTime;

score++;
clicks++;
totalReaction += reaction;

target.remove();

updateStats();

setTimeout(() => spawnTarget(speed * difficultyRamp(mode), mode), speed);
};

gameArea.appendChild(target);

setTimeout(() => {
if (target.parentNode) {
target.remove();
if (active) spawnTarget(speed, mode);
}
}, speed);
}

function difficultyRamp(mode) {
if (mode === "easy") return 1;
if (mode === "medium") return 0.95;
if (mode === "hard") return 0.9;
if (mode === "impossible") return 0.75;
}

function updateStats() {
let avg = totalReaction / clicks;

stats.innerHTML =
`Hits: ${score} | Avg Reaction: ${avg.toFixed(0)}ms`;

if (clicks >= 10) {
endGame();
}
}

function endGame() {
active = false;
gameArea.innerHTML = "";

let avg = totalReaction / clicks;

let entry = {
mode: info.innerText,
score: score,
reaction: avg.toFixed(0)
};

leaderboard.push(entry);
leaderboard.sort((a,b)=>a.reaction - b.reaction);
leaderboard = leaderboard.slice(0, 5);

localStorage.setItem("leaderboard", JSON.stringify(leaderboard));

showLeaderboard();

stats.innerHTML += "<br><b>Game Over</b>";

alert("Game Over! Avg Reaction: " + avg.toFixed(0) + "ms");
}

function showLeaderboard() {
let html = "<h3>🏆 Local Leaderboard</h3>";

leaderboard.forEach((l,i)=>{
html += `<p>#${i+1} | ${l.reaction}ms | ${l.score} hits</p>`;
});

document.getElementById("leaderboard").innerHTML = html;
}

function resetGame() {
gameArea.innerHTML = "";
score = 0;
clicks = 0;
totalReaction = 0;
active = false;
}

showLeaderboard();

</script>

</body>
</html>
