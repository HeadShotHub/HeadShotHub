<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Headshot Hub</title>

<style>
body {
margin: 0;
font-family: Arial, sans-serif;
background: #0f172a;
color: white;
text-align: center;
}

header {
padding: 25px;
font-size: 28px;
font-weight: bold;
}

.container {
max-width: 500px;
margin: auto;
background: #1e293b;
padding: 20px;
border-radius: 12px;
}

input {
width: 80%;
padding: 10px;
margin: 8px;
border-radius: 8px;
border: none;
}

button {
padding: 10px 15px;
margin-top: 10px;
border: none;
border-radius: 8px;
background: #22c55e;
cursor: pointer;
font-weight: bold;
}

button:hover {
background: #16a34a;
}

.result {
margin-top: 15px;
font-size: 20px;
}

.history {
margin-top: 20px;
text-align: left;
padding: 10px;
background: #111827;
border-radius: 10px;
}

.bad { color: #ef4444; }
.ok { color: #facc15; }
.good { color: #22c55e; }
</style>
</head>

<body>

<header>🎯 Headshot Hub</header>

<div class="container">

<h3>Track Your Aim</h3>

<input id="kills" type="number" placeholder="Total Kills">
<input id="hs" type="number" placeholder="Headshots">

<button onclick="addGame()">Add Game</button>

<div class="result" id="result"></div>

<div class="history">
<h4>📊 Game History</h4>
<div id="history"></div>
</div>

</div>

<script>
let games = JSON.parse(localStorage.getItem("games")) || [];

function addGame() {
let kills = Number(document.getElementById("kills").value);
let hs = Number(document.getElementById("hs").value);

if (!kills || kills <= 0) {
document.getElementById("result").innerText = "Enter valid kills";
return;
}

let percent = (hs / kills) * 100;

games.push({kills, hs, percent});
localStorage.setItem("games", JSON.stringify(games));

showResult(percent);
showHistory();
}

function showResult(p) {
let msg = "";

if (p < 15) msg = "⚠️ Work on crosshair placement";
else if (p < 25) msg = "📈 Average aim - keep improving";
else msg = "🔥 Strong aim - good job";

document.getElementById("result").innerHTML =
`${p.toFixed(2)}% HS <br> ${msg}`;
}

function showHistory() {
let html = "";

games.slice().reverse().forEach((g, i) => {
html += `<p>Game ${games.length - i}: ${g.percent.toFixed(1)}% HS</p>`;
});

document.getElementById("history").innerHTML = html;
}

showHistory();
</script>

</body>
</html>
