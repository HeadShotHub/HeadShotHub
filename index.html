<!DOCTYPE html>
<html>
<head>
<title>Headshot Hub Online</title>
</head>
<body>
<h2>Headshot Hub Online</h2>

<button id="loginBtn">Login with Google</button>

<p id="status">Not logged in</p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getAuth,
GoogleAuthProvider,
signInWithPopup,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// 🔥 PASTE YOUR CONFIG HERE
const firebaseConfig = {
  apiKey: "AIzaSyAWnMFACrQhkpFcQcdJdjqPUN4nRN9nn1Q",
  authDomain: "headshothubarena-50388.firebaseapp.com",
  projectId: "headshothubarena-50388",
  storageBucket: "headshothubarena-50388.firebasestorage.app",
  messagingSenderId: "618630069956",
  appId: "1:618630069956:web:2b542df64da400bd9c5391"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const provider = new GoogleAuthProvider();

document.getElementById("loginBtn").onclick = () => {
signInWithPopup(auth, provider)
.then((result) => {
console.log("Logged in:", result.user.displayName);
})
.catch((error) => {
console.log(error);
});
};

onAuthStateChanged(auth, (user) => {
if (user) {
document.getElementById("status").innerText =
"Logged in as: " + user.displayName;
} else {
document.getElementById("status").innerText =
"Not logged in";
}
});

</script>

</body>
</html>
