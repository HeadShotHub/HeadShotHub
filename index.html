<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Headshot Hub</title>

<style>
body {
margin: 0;
font-family: Arial;
background: #0b1220;
color: white;
text-align: center;
}

header {
padding: 25px;
font-size: 32px;
font-weight: bold;
}

.card {
background: #162235;
max-width: 520px;
margin: 15px auto;
padding: 20px;
border-radius: 14px;
}

input {
width: 80%;
padding: 10px;
margin: 6px;
border-radius: 8px;
border: none;
}

button {
padding: 10px 14px;
margin: 6px;
border: none;
border-radius: 8px;
background: #22c55e;
font-weight: bold;
cursor: pointer;
}

button:hover { background: #16a34a; }

.big { font-size: 22px; margin-top: 10px; }

.rank {
font-size: 26px;
font-weight: bold;
}

.shareBox {
background: #0f172a;
padding: 12px;
border-radius: 10px;
margin-top: 10px;
font-size: 14px;
}

.bar {
width: 80%;
height: 10px;
background: #0f172a;
margin: 10px auto;
border-radius: 10px;
}

.fill {
height: 100%;
width: 0%;
background: #22c55e;
}

</style>
</head>

<body>

<header>🎯 Headshot Hub</header>

<div class="card">

<h3>Enter Match Stats</h3>

<input id="kills" type="number" placeholder="Kills">
<input id="hs" type="number" placeholder="Headshots">

<button onclick="add()">Add Match</button>

<div id="result" class="big"></div>

<div class="bar">
<div class="fill" id="fill"></div>
</div>

<div id="rank" class="rank"></div>

<button onclick="share()">📤 Share Result</button>

<div class="shareBox" id="shareBox"></div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("data")) || [];

function add() {
let k = Number(document.getElementById("kills").value);
let h = Number(document.getElementById("hs").value);

if (!k || k <= 0) return;

let pct = (h / k) * 100;
data.push(pct);

localStorage.setItem("data", JSON.stringify(data));

update(pct);
}

function avg() {
return data.reduce((a,b)=>a+b,0) / data.length || 0;
}

function rank(v) {
if (v < 10) return "Iron";
if (v < 18) return "Bronze";
if (v < 25) return "Silver";
if (v < 32) return "Gold";
if (v < 40) return "Platinum";
return "Radiant 🔥";
}

function update(latest) {

let a = avg();
let r = rank(a);

document.getElementById("result").innerHTML =
`Latest: ${latest.toFixed(1)}% HS`;

document.getElementById("rank").innerHTML =
`Rank: ${r}`;

document.getElementById("fill").style.width =
Math.min(a, 50) * 2 + "%";

document.getElementById("shareBox").innerHTML =
"Beat this: " + latest.toFixed(1) + "% HS 🔥";

}

function share() {
let text =
`I just got ${avg().toFixed(1)}% HS in Headshot Hub 🎯
Can you beat me?

Play here: https://headshothub.github.io/YOUR-REPO/`;

navigator.clipboard.writeText(text);

document.getElementById("shareBox").innerHTML =
"Copied! Paste it on TikTok / Discord 🔥";
}

</script>

</body>
</html>
