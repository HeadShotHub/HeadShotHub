<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Headshot Hub</title>

<style>
body {
margin: 0;
font-family: Arial, sans-serif;
background: #0b1220;
color: white;
text-align: center;
}

header {
padding: 25px;
font-size: 32px;
font-weight: bold;
}

.card {
background: #162235;
max-width: 520px;
margin: 15px auto;
padding: 20px;
border-radius: 14px;
box-shadow: 0 0 20px rgba(0,0,0,0.4);
}

input {
width: 80%;
padding: 10px;
margin: 8px;
border-radius: 8px;
border: none;
}

button {
padding: 10px 16px;
margin-top: 10px;
border: none;
border-radius: 8px;
background: #22c55e;
font-weight: bold;
cursor: pointer;
}

button:hover {
background: #16a34a;
}

.big {
font-size: 22px;
margin-top: 10px;
}

.bad { color: #ef4444; }
.mid { color: #facc15; }
.good { color: #22c55e; }

.bar {
width: 80%;
height: 12px;
background: #0f172a;
border-radius: 10px;
margin: 10px auto;
overflow: hidden;
}

.fill {
height: 100%;
width: 0%;
background: #22c55e;
}

.small {
font-size: 14px;
opacity: 0.8;
}

</style>
</head>

<body>

<header>🎯 Headshot Hub</header>

<div class="card">
<h3>📊 Add Match Stats</h3>

<input id="kills" type="number" placeholder="Total Kills">
<input id="hs" type="number" placeholder="Headshots">

<button onclick="addMatch()">Add Match</button>

<div id="output" class="big"></div>

<div class="bar">
<div class="fill" id="bar"></div>
</div>

<div id="rankText" class="small"></div>
</div>

<div class="card">
<h3>🔥 Your Rank</h3>
<div id="rank" class="big">Unranked</div>
</div>

<div class="card">
<h3>📈 Progress History</h3>
<div id="history"></div>
</div>

<script>

let data = JSON.parse(localStorage.getItem("data")) || [];

function addMatch() {
let k = Number(document.getElementById("kills").value);
let h = Number(document.getElementById("hs").value);

if (!k || k <= 0) return;

let percent = (h / k) * 100;

data.push(percent);
localStorage.setItem("data", JSON.stringify(data));

updateUI(percent);
}

function getAverage() {
if (data.length === 0) return 0;
return data.reduce((a,b)=>a+b,0)/data.length;
}

function getRank(avg) {
if (avg < 10) return "Iron";
if (avg < 18) return "Bronze";
if (avg < 25) return "Silver";
if (avg < 32) return "Gold";
if (avg < 40) return "Platinum";
return "Radiant";
}

function updateUI(latest) {

let avg = getAverage();
let rank = getRank(avg);

let msg = "";

if (latest < 15) msg = "⚠️ Work on crosshair placement";
else if (latest < 25) msg = "📈 Improving aim";
else msg = "🔥 Strong performance";

document.getElementById("output").innerHTML =
`Latest: ${latest.toFixed(1)}% HS`;

document.getElementById("rank").innerHTML = rank;

let progress = Math.min(avg, 50) * 2;

document.getElementById("bar").style.width = progress + "%";

document.getElementById("rankText").innerHTML =
`Average HS: ${avg.toFixed(1)}%`;

renderHistory();
}

function renderHistory() {
let html = "";

data.slice().reverse().forEach((d,i)=>{
html += `<p>Match ${data.length - i}: ${d.toFixed(1)}% HS</p>`;
});

document.getElementById("history").innerHTML = html;
}

renderHistory();

</script>

</body>
</html>
